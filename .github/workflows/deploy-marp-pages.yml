name: Deploy Marp slides to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Convert Markdown to HTML and PDF
        uses: KoharaKazuya/marp-cli-action@v4
        with:
          config-file: ./.marprc-ci.yml
          generate-html: true
          generate-pdf: true

      # marp-cli-action uses Docker; output/ is often root-owned on the host.
      # HTML references assets/... relative to the site root; Marp does not copy repo assets into output/.
      - name: Prepare Pages artifact (permissions, assets, index)
        run: |
          sudo chown -R "$(whoami):$(whoami)" output
          mkdir -p output/assets
          cp -R assets/. output/assets/
          cp output/SLIDE.html output/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
